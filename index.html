<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CalmPath</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2E1R2DVVXQ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-2E1R2DVVXQ');
</script>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f6f7f9;
  color: #111;
  margin: 0;
  padding: 16px;
}

/* NEW: container for consistent width */
.container {
  max-width: 640px;
  margin: 0 auto;
}

/* Header */

.place-header {
  margin-bottom: 8px;
}

.place-name {
  font-size: 1.4rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.place-location {
  font-size: 0.9rem;
  color: #666;
}

/* Verified badge */

.verified-badge {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  line-height: 1;
  padding: 2px 8px;
  border-radius: 999px;
  background-color: #f3f6f4;
  color: #3f6f5a;
  border: 1px solid #dde7e1;
  cursor: pointer;
}

.verified-badge .check {
  font-size: 12px;
}

/* Tooltip */

.verified-tooltip {
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: #fff;
  font-size: 11px;
  padding: 6px 8px;
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease, transform 0.15s ease;
  z-index: 20;
}

.verified-tooltip.show {
  opacity: 1;
  transform: translateX(-50%) translateY(2px);
}

.verified-tooltip::before {
  content: "";
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 4px;
  border-style: solid;
  border-color: transparent transparent #111 transparent;
}

/* Text */

h1 {
  font-size: 1.8rem;
  margin-bottom: 4px;
}

p {
  line-height: 1.4;
  margin: 6px 0;
}

/* Search */

.search-container {
  position: relative;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 1rem;
  margin: 16px 0 8px 0;
  border-radius: 12px; /* updated */
  border: 1px solid #ddd;
  box-sizing: border-box;
}

#suggestions {
  position: absolute;
  width: 100%;
  border: 1px solid #ddd;
  border-radius: 8px;
  max-height: 260px;
  overflow-y: auto;
  background: white;
  margin-top: 6px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  z-index: 1000;
}

.suggestion-item {
  padding: 12px 14px;
  cursor: pointer;
  font-size: 15px;
}

.suggestion-item:hover {
  background: #f7f7f7;
}

/* Explore row */

.explore-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  margin-bottom: 8px;
  padding: 10px 2px;
}

.explore-text {
  font-size: 1rem;
  color: #111;
  font-weight: 600;
}

.explore-btn {
  background: white;
  border: 1px solid #ddd;
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 0.85rem;
  cursor: pointer;
}

.explore-btn:active {
  transform: scale(0.97);
}

/* Cards */

.card {
  background: #f6f7f9;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
  border: 1px solid #e3e6eb;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.snapshot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 12px;
}

.snapshot-item {
  background: white;
  border-radius: 10px;
  padding: 14px;
  border: 1px solid #e6e6e6;
}

/* Hidden */

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>CalmPath</h1>

<p>
<strong>Know what you're walking into before you go.</strong><br>
Parking, noise, restrooms, and layout at a glance.
No reviews. No ratings. Just what to expect.
</p>

<p style="margin-top:10px;font-weight:600;">
550+ restaurants, bars, & cafes across Cincinnati & Northern Kentucky
</p>

<div class="search-container">
  <input
    id="search"
    placeholder="Search a place (ex: Rhinegeist Brewery)"
    oninput="searchPlace()"
  />
  <div id="suggestions"></div>
</div>

<div class="explore-row">
  <div class="explore-text">Haven't decided on a place yet?</div>
  <button class="explore-btn" onclick="goToFilters()">Browse Spots</button>
</div>

<div id="result"></div>

</div>

<script src="places.js"></script>

<script>
function renderPlaceHeader(place) {
  const isVerified = place.verified === true;

  return `
    <div class="place-header">
      <div class="place-name">
        ${place.name}
        ${isVerified ? `
          <span class="verified-badge" title="Confirmed by CalmPath users">
            <span class="check">✔</span>
            Verified
          </span>
        ` : ``}
      </div>
      <div class="place-location">${place.location}</div>
    </div>
  `;
}

function goToFilters() {
  window.location.href = "filters.html";
}
</script>

</body>
</html>
